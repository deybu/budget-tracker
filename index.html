<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>

    <nav class="navbar">
      <span class="logo">BudgetTracker</span>
      <div class="nav-right">
        <div class="theme-picker">
          <label for="theme-select" class="theme-label">Theme</label>
          <select id="theme-select" class="theme-selector">
            <option value="theme-default">Classic</option>
            <option value="theme-dark">Dark</option>
            <option value="theme-cute">Pink Cute</option>
            <option value="theme-it">IT Tech</option>
            <option value="theme-hello-kitty">Hello Kitty</option>
            <option value="theme-rapunzel">Rapunzel</option>
            <option value="theme-lavender">Lavender</option>
          </select>
        </div>
        <span class="user-info" id="user-email">Welcome</span>
        <button id="logout-btn" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="app-container">
      
      <section class="summary">
        <div class="card income">
          <p class="card-label">Total Income</p>
          <p class="card-amount" id="total-income">$0.00</p>
        </div>
        <div class="card expenses">
          <p class="card-label">Total Expenses</p>
          <p class="card-amount" id="total-expenses">$0.00</p>
        </div>
        <div class="card balance">
          <p class="card-label">Balance</p>
          <p class="card-amount" id="balance">$0.00</p>
        </div>
      </section>

      <div class="main-content">
        
        <div class="left-column">
          <section class="chart-section">
            <h2>Spending by Category</h2>
            <div class="chart-container">
              <canvas id="spending-chart"></canvas>
            </div>
          </section>

          <section class="form-section">
            <h2>Add Transaction</h2>
            <div class="form">
              <input type="text" id="description" placeholder="Description (e.g. Salary, Groceries)" />
              <div class="amount-input-group">
                <span class="currency-prefix">₱</span>
                <input type="text" id="amount" placeholder="Amount (use - for expense, e.g. -50)" />
              </div>
              <div class="preset-row">
                <button type="button" class="preset-key" data-preset="50">₱50</button>
                <button type="button" class="preset-key" data-preset="100">₱100</button>
                <button type="button" class="preset-key" data-preset="200">₱200</button>
                <button type="button" class="preset-key" data-preset="500">₱500</button>
              </div>
              <div class="keypad">
                <button type="button" class="keypad-key" data-key="1">1</button>
                <button type="button" class="keypad-key" data-key="2">2</button>
                <button type="button" class="keypad-key" data-key="3">3</button>
                <button type="button" class="keypad-key" data-key="4">4</button>
                <button type="button" class="keypad-key" data-key="5">5</button>
                <button type="button" class="keypad-key" data-key="6">6</button>
                <button type="button" class="keypad-key" data-key="7">7</button>
                <button type="button" class="keypad-key" data-key="8">8</button>
                <button type="button" class="keypad-key" data-key="9">9</button>
                <button type="button" class="keypad-key action-key" data-action="toggle-minus">-</button>
                <button type="button" class="keypad-key" data-key="0">0</button>
                <button type="button" class="keypad-key action-key" data-action="clear">C</button>
              </div>
              <select id="category">
                <option value="Income">Income</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
                <option value="Health">Health</option>
                <option value="Other">Other</option>
              </select>
              <input type="date" id="date" />
              <button id="add-btn">Add Transaction</button>
            </div>
          </section>
        </div>

        <div class="right-column">
          <section class="transactions-section">
            <h2>Recent Transactions</h2>
            <ul id="transactions-list" class="transactions-list">
              </ul>
          </section>
        </div>

      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
